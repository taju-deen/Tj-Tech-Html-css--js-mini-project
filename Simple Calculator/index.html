<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple calculator</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>

    <section class="all-container">
        <div class="sub-menu-container">
           

           <div class="menu-container">
                 <div class="area" i>+</div>

                 <div class=" select">
                    <div class="option" >-</div>
                    <div class="option">/</div>
                    <div class="option">+</div>
                    <div class="option">*</div>
                 </div>
           </div>

           
           

             <div class="area" id="choose"> > </div>
        </div>

        <div class="showResult"> Display</div>

        <div class="input">

            <input type="number" placeholder="0"  class="num1">
            <input type="number" placeholder="0"  value="" class="num2">
        </div>

        <button>Result</button>
        <script src="index.js"></script>
        
    </section>

    
    
</body>
</html>
